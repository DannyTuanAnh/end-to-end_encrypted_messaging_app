steps:
  # ================= API GATEWAY =================
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/api-gateway",
        "-f",
        "backend/Dockerfile.api",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/api-gateway"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "chat-app-api-gateway",
        "--image",
        "gcr.io/$PROJECT_ID/api-gateway",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--command",
        "./main",
      ]

  # ================= AUTH SERVICE =================
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/auth-service",
        "-f",
        "backend/Dockerfile.auth",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/auth-service"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "chat-app-auth-service",
        "--image",
        "gcr.io/$PROJECT_ID/auth-service",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--command",
        "./main",
      ]

  # ================= USER SERVICE =================
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/user-service",
        "-f",
        "backend/Dockerfile.user",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/user-service"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "chat-app-user-service",
        "--image",
        "gcr.io/$PROJECT_ID/user-service",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--command",
        "./main",
      ]

images:
  - "gcr.io/$PROJECT_ID/api-gateway"
  - "gcr.io/$PROJECT_ID/auth-service"
  - "gcr.io/$PROJECT_ID/user-service"
