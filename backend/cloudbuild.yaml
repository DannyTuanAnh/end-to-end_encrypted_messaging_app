steps:
  # ================= API GATEWAY =================
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api-gateway",
        "-f",
        "backend/Dockerfile.api",
        "backend",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api-gateway",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "chat-app-api-gateway",
        "--image",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api-gateway",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--command",
        "./main",
      ]

  # ================= AUTH SERVICE =================
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auth-service",
        "-f",
        "backend/Dockerfile.auth",
        "backend",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auth-service",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "chat-app-auth-service",
        "--image",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auth-service",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--command",
        "./main",
      ]

  # ================= USER SERVICE =================
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/user-service",
        "-f",
        "backend/Dockerfile.user",
        "backend",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/user-service",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "chat-app-user-service",
        "--image",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/user-service",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--command",
        "./main",
      ]

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api-gateway"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auth-service"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/user-service"

options:
  logging: CLOUD_LOGGING_ONLY
