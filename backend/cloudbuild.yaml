steps:
  # ================= API GATEWAY =================
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker pull us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api-gateway:latest || exit 0

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "--cache-from",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api-gateway:latest",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api-gateway",
        "-f",
        "backend/Dockerfile.api",
        "backend",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api-gateway",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "chat-app-api-gateway",
        "--image",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api-gateway",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--command",
        "./main",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud container clusters get-credentials chat-app-cluster --region us-central1
        kubectl set image deployment/api-gateway-deployment api-gateway-sha256-1=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api-gateway:latest

  # ================= AUTH SERVICE =================
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker pull us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auth-service:latest || exit 0

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "--cache-from",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auth-service:latest",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auth-service",
        "-f",
        "backend/Dockerfile.auth",
        "backend",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auth-service",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "chat-app-auth-service",
        "--image",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auth-service",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--command",
        "./main",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud container clusters get-credentials chat-app-cluster --region us-central1
        kubectl set image deployment/auth-service auth-service-sha256-1=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auth-service:latest

  # ================= USER SERVICE =================
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker pull us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/user-service:latest || exit 0

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "--cache-from",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/user-service:latest",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/user-service",
        "-f",
        "backend/Dockerfile.user",
        "backend",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/user-service",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "chat-app-user-service",
        "--image",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/user-service",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--command",
        "./main",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud container clusters get-credentials chat-app-cluster --region us-central1
        kubectl set image deployment/user-service user-service-sha256-1=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/user-service:latest

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api-gateway"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/auth-service"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/user-service"

options:
  logging: CLOUD_LOGGING_ONLY
