syntax = "proto3";

package proto;

import "buf/validate/validate.proto";

option go_package = "internal/gen-proto/notify;notify_proto";

service NotifyService {
    rpc SendProcessImageToUserService(SendProcessImageToUserServiceRequest) returns (SendProcessImageToUserServiceResponse);
}

message SendProcessImageToUserServiceRequest {
    string user_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64.gt = 0
  ];
    string status = 2[
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^(?!\\s*$).+"
  ];
    string image_url = 3[
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^(?!\\s*$).+"
  ];
}

message SendProcessImageToUserServiceResponse {
    bool success = 1;
    string message = 2;
}



