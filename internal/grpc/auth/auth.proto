syntax = "proto3";

package proto;

option go_package = "internal/grpc/auth;auth_proto";

service AuthService {
  rpc ValidateAPIKey(ValidateAPIKeyRequest) returns (ValidateAPIKeyResponse);
}

message ValidateAPIKeyRequest {
  string api_key = 1;
}

message ValidateAPIKeyResponse {
  bool valid = 1;
  string msg = 2;
}
