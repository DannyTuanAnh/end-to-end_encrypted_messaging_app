syntax = "proto3";

package proto;

option go_package = "internal/grpc/auth;auth_proto";

service AuthService {
  rpc LoginGoogle(LoginRequest) returns (LoginResponse);
}

message LoginRequest {
  string author_code = 1;
}

message LoginResponse {
  string session = 1;
  int64 user_id = 2;
  string device_id =3;
}


