syntax = "proto3";

package proto;

import "buf/validate/validate.proto";

option go_package = "internal/gen-proto/user;user_proto";

service UserService {
  rpc CreateProfile(CreateProfileRequest) returns (CreateProfileResponse);
  rpc DisableUserByUserID(DisableUserRequest) returns (DisableUserResponse);
  rpc GetProfileByUserID(GetProfileByUserIDRequest) returns (GetProfileByUserIDResponse);
  rpc GetProfileByUserUUID(GetProfileByUserUUIDRequest) returns (GetProfileByUserUUIDResponse);
  rpc VerifyIDTokenOTP(VerifyIDTokenOTPRequest) returns (VerifyIDTokenOTPResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc UpdateAvatar(UpdateAvatarRequest) returns (UpdateAvatarResponse);
  rpc ReportUserImage(ReportUserImageRequest) returns (ReportUserImageResponse);
}

message CreateProfileRequest {
  int64 user_id = 1 [
    (buf.validate.field).required = true
  ];
  string name = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 2
  ];
  string email = 3 [
    (buf.validate.field).string.email = false,
    (buf.validate.field).string.max_len = 254,
    (buf.validate.field).string.min_len = 3
  ];
  string birthday = 4 [
  (buf.validate.field).required = false,
  (buf.validate.field).string.pattern = "^$|^(19|20)\\d\\d-(0[1-9]|1[0-2])-(0[1-9]|[12]\\d|3[01])$"
  
];

  string avatar_url = 5;
}

message CreateProfileResponse {
  bool success = 1;
  string message = 2;
}

message DisableUserRequest {
  int64 user_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64.gt = 0
  ];
}

message DisableUserResponse {
  bool success = 1;
  string message = 2;
}

message GetProfileByUserIDRequest {
  int64 user_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64.gt = 0
  ];
}

message GetProfileByUserIDResponse {
  string uuid = 1;
  optional string name = 2;
  string email = 3;
  optional string birthday = 4;
  optional string phone = 5;
  optional string avatar_url = 6;
}

message GetProfileByUserUUIDRequest {
  string uuid = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  int64 user_id = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64.gt = 0
  ];
}

message GetProfileByUserUUIDResponse {
  string name = 1;
  string birthday = 2;
  string avatar_url = 3;
}

message VerifyIDTokenOTPRequest {
  string id_token = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^(?!\\s*$).+"
  ];
}

message VerifyIDTokenOTPResponse {
  bool valid = 1;
  string verified_phone = 2;
  string message = 3;
}

message UpdateProfileRequest {
  int64 user_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64.gt = 0
  ];
  optional string name = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 100,
    (buf.validate.field).string.pattern = "^(?!\\s*$).+"
  ];
  optional string birthday = 3 [
    (buf.validate.field).string.pattern = "^$|^(19|20)\\d\\d-(0[1-9]|1[0-2])-(0[1-9]|[12]\\d|3[01])$"
  ];

  optional string phone = 4;
}

message UpdateProfileResponse {
  string message = 1;
}

message UpdateAvatarRequest {
  int64 user_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64.gt = 0
  ];

  string avatar_url = 2 [
    (buf.validate.field).required = true
  ];
}

message UpdateAvatarResponse {
  string message = 1;
}

message ReportUserImageRequest {
  string uuid = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  string bucket = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^(?!\\s*$).+"
  ];

  string name = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^(?!\\s*$).+",
    (buf.validate.field).string.uuid = true
  ];
}

message ReportUserImageResponse {
  string message = 1;
}




